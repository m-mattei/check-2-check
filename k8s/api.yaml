apiVersion: v1
kind: Service
metadata:
  name: api
spec:
  selector:
    app: api
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: check-2-check-api:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /var/run/secrets/firebase/service-account.json
          volumeMounts:
            - name: firebase-creds
              mountPath: /var/run/secrets/firebase
              readOnly: true
          volumes:
            - name: firebase-creds
              secret:
                secretName: firebase-credentials
