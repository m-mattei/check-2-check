name: Auto Commit Agent Changes

on:
  workflow_dispatch:
    inputs:
      commit_message:
        description: 'Commit message'
        required: false
        default: 'Agent: code changes'
      push:
        description: 'Push to remote'
        type: boolean
        default: true

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit changes
        run: |
          git config --local user.email "agent@opencode.ai"
          git config --local user.name "OpenCode Agent"
          
          git add -A
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          
          MSG="${{ github.event.inputs.commit_message }}"
          [ -z "$MSG" ] && MSG="Agent: code changes $(date '+%Y-%m-%d %H:%M')"
          
          git commit -m "$MSG"
          
          if [ "${{ github.event.inputs.push }}" == "true" ]; then
            git push
          fi
